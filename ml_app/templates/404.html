{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="py-24 flex flex-col items-center justify-center min-h-[70vh] relative overflow-hidden">
    <!-- Decorative background elements -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full -z-10 overflow-hidden pointer-events-none">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-rose-500/10 rounded-full blur-[120px] animate-pulse-slow"></div>
    </div>

    <div class="text-center px-4 relative z-10">
        <div class="bg-rose-500/10 border border-rose-500/20 p-8 rounded-[2.5rem] w-32 h-32 flex items-center justify-center mx-auto mb-12 shadow-2xl shadow-rose-900/20">
            <svg class="w-16 h-16 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
            </svg>
        </div>
        
        <div class="space-y-4 mb-12">
            <h1 class="text-9xl font-extrabold text-white/5 mb-4 tracking-tighter absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none select-none">404</h1>
            <h2 class="text-5xl font-extrabold text-white tracking-tighter uppercase">Signal Lost</h2>
            <div class="h-1 w-20 bg-brand-500 mx-auto rounded-full"></div>
            <p class="text-xl text-dark-400 max-w-md mx-auto leading-relaxed font-medium">
                The requested neural node does not exist or has been relocated within the encrypted sectors.
            </p>
        </div>

        <div class="flex flex-col sm:flex-row items-center justify-center gap-6">
            <a href="{% url 'ml_app:home' %}" class="inline-flex items-center px-10 py-4 rounded-2xl shadow-2xl text-white bg-brand-600 hover:bg-brand-500 transition-all transform hover:-translate-y-1 font-extrabold text-xs tracking-[0.2em] uppercase border border-white/10">
                RETURN_TO_CORE
            </a>
            <button onclick="history.back()" class="inline-flex items-center px-10 py-4 rounded-2xl shadow-xl text-dark-300 bg-white/5 hover:bg-white/10 transition-all transform hover:-translate-y-1 font-extrabold text-xs tracking-[0.2em] uppercase border border-white/5">
                PREVIOUS_STATE
            </button>
        </div>
        
        <div class="mt-20 font-mono text-[9px] text-dark-500 uppercase tracking-[0.5em] animate-pulse">
            ERROR_CODE: 0x404_SEGMENTATION_FAULT
        </div>
    </div>
</div>
{% endblock %}
